<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natyam Transcribe</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
}

/* Hero section */
.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  background-image: url("hero-bg.png");
  background-size: cover;
  background-position: center;
}

/* Button */
.real-btn {
  position: absolute;
  left: 50%;
  bottom: 120px;
  transform: translateX(-50%);
  padding: 18px 50px;
  background-color: #d4a437;
  color: black;
  font-size: 18px;
  font-weight: bold;
  text-decoration: none;
  border-radius: 12px;
  z-index: 10;              /* VERY IMPORTANT */
  display: inline-block;
  cursor: pointer;
}

.real-btn:hover {
  background-color: #e6b84d;
}
</style>
</head>

<body>

<div class="hero">
  <a href="transcribe.html" class="real-btn">GET STARTED</a>
</div>

</body>
</html>
