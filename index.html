<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natyam Transcribe</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body, html {
  height: 100%;
}

/* Hero Section */
.hero {
  width: 100%;
  height: 100vh;
  background: url('hero-bg.png') no-repeat center center;
  background-size: cover;
  position: relative;
}

/* Real Button */
.real-btn {
  position: absolute;
  bottom: 120px;          /* Adjust vertically if needed */
  left: 50%;
  transform: translateX(-50%);
  padding: 18px 50px;
  background: #d4a437;
  color: black;
  text-decoration: none;
  font-weight: bold;
  font-size: 18px;
  border-radius: 12px;
  transition: 0.3s ease;
}

/* Hover Effect */
.real-btn:hover {
  background: #e6b84d;
  transform: translateX(-50%) scale(1.05);
}
</style>

</head>

<body>

<div class="hero">
  <a href="transcribe.html" class="real-btn">GET STARTED</a>
</div>

</body>
</html>
