<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natyam Transcribe</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  /* Show full image without cutting borders */
  .hero {
    width: 100%;
    height: 100vh;
    background: url('hero-bg.png') no-repeat center center;
    background-size: contain;   /* IMPORTANT - shows full borders */
    background-color: #5a0000;  /* Fills empty space nicely */
    position: relative;
  }

  /* Invisible clickable area aligned to button */
  .button-link {
    position: absolute;
    left: 50%;
    top: 67%;              /* Adjusted to match your button */
    transform: translate(-50%, -50%);
    width: 280px;          /* Match your button width */
    height: 75px;          /* Match your button height */
    cursor: pointer;
  }

  /* Make responsive for smaller screens */
  @media (max-width: 768px) {
    .button-link {
      width: 200px;
      height: 60px;
      top: 70%;
    }
  }

</style>
</head>

<body>

<div class="hero">
  <a href="transcribe.html" class="button-link"></a>
</div>

</body>
</html>
