<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natyam Transcribe</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Playfair Display', serif;
  }

  /* Fade animation */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-1 { animation: fadeIn 1s ease forwards; opacity: 0; }
  .fade-2 { animation: fadeIn 1s ease forwards 0.5s; opacity: 0; }
  .fade-3 { animation: fadeIn 1s ease forwards 1s; opacity: 0; }

  /* Gold gradient text */
  .gold-text {
    background: linear-gradient(to right, #facc15, #f59e0b, #facc15);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Logo glow */
  .logo-glow {
    box-shadow: 0 0 60px rgba(255, 200, 0, 0.4);
  }
</style>
</head>

<body class="relative min-h-screen flex items-center justify-center text-center overflow-hidden">

  <!-- Background -->
  <div class="absolute inset-0 bg-cover bg-center"
       style="background-image: url('background.jpeg');">
  </div>

  <!-- Dark overlay -->
  <div class="absolute inset-0 bg-[#4b0000]/80"></div>

  <!-- Content -->
  <div class="relative z-10 px-6">

    <!-- Logo -->
    <img src="logo.png"
         alt="Bharatanatyam Logo"
         class="w-44 h-44 md:w-56 md:h-56 rounded-full mx-auto logo-glow fade-1">

    <!-- Title -->
    <h1 class="mt-10 text-5xl md:text-7xl font-bold tracking-wide gold-text fade-2">
      NATYAM TRANSCRIBE
    </h1>

    <!-- Subtitle -->
    <p class="mt-6 text-lg md:text-xl text-gray-200 max-w-2xl mx-auto fade-3">
      Real-time transcription of Bharatanatyam — decode mudras,
      adavus & expressions with precision
    </p>

    <!-- Button -->
    <a href="transcribe.html"
       class="inline-block mt-10 px-12 py-4 rounded-xl bg-yellow-500 text-black text-lg tracking-widest uppercase
              hover:scale-105 transition duration-300 shadow-xl fade-3">
      Get Started
    </a>

  </div>

</body>
</html>
