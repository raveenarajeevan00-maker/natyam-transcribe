<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natyam Transcribe</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Playfair Display', serif;
  }

  /* Fade animation */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-1 { animation: fadeInUp 1s ease forwards; }
  .fade-2 { animation: fadeInUp 1s ease forwards 0.5s; opacity: 0; }
  .fade-3 { animation: fadeInUp 1s ease forwards 1s; opacity: 0; }

</style>
</head>

<body class="relative min-h-screen flex items-center justify-center text-center text-yellow-400 overflow-hidden">

<!-- 🔥 Background Image -->
<div class="absolute inset-0 bg-cover bg-center"
     style="background-image: url('ornate-background.png');">
</div>

<!-- Dark Overlay for readability -->
<div class="absolute inset-0 bg-black/60"></div>

<!-- 🌟 Content On Top -->
<div class="relative z-10 px-6">

  <h1 class="text-4xl md:text-6xl lg:text-7xl font-bold bg-clip-text text-transparent 
             bg-gradient-to-r from-yellow-400 via-orange-400 to-yellow-500 fade-1">
    Natyam Transcribe
  </h1>

  <p class="mt-6 text-lg md:text-xl text-white/80 max-w-2xl mx-auto fade-2">
    Real-time transcription of Bharatanatyam — decode mudras, adavus & expressions with precision
  </p>

  <a href="transcribe.html"
     class="inline-block mt-10 px-10 py-4 rounded-lg bg-yellow-500 text-black text-lg tracking-widest uppercase
            hover:scale-105 transition duration-300 shadow-lg fade-3">
    Get Started
  </a>

</div>

</body>
</html>
