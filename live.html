<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Real-Time Video</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Playfair Display', serif; }
</style>
</head>

<body class="min-h-screen bg-gradient-to-b from-[#2b0006] via-[#4a000d] to-black text-yellow-400 flex flex-col">

<!-- Header -->
<header class="flex items-center justify-between px-8 py-6">
  <a href="transcribe.html" onclick="stopStream()" class="text-gray-400 hover:text-yellow-400 transition">
    ← Back
  </a>
  <h2 class="text-2xl tracking-wider">Real-Time Video</h2>
  <div></div>
</header>

<!-- Main -->
<div class="flex-1 flex flex-col items-center px-6 pb-10">

  <!-- Video Box -->
  <div class="relative w-full max-w-4xl aspect-video rounded-2xl overflow-hidden border border-yellow-500/30 bg-black/40 backdrop-blur-md shadow-xl">

    <video id="video" autoplay playsinline muted class="w-full h-full object-cover hidden"></video>

    <!-- Placeholder -->
    <div id="placeholder" class="flex flex-col items-center justify-center h-full text-center text-gray-400">
      <div class="text-6xl mb-4">🎥</div>
      <p class="text-lg">Start live capture to begin transcription</p>
    </div>

    <!-- Live Indicator -->
    <div id="liveIndicator" class="hidden absolute top-4 left-4 flex items-center gap-2 px-3 py-1 rounded-full bg-red-600/90">
      <span class="w-2 h-2 rounded-full bg-white animate-pulse"></span>
      <span class="text-white text-xs uppercase tracking-widest">Live</span>
    </div>

  </div>

  <!-- Transcription Box -->
  <div id="transcriptionBox"
       class="hidden mt-6 w-full max-w-4xl p-6 rounded-2xl border border-yellow-500/30 bg-black/40 backdrop-blur-md">
    <h3 class="text-lg text-yellow-400 mb-3 tracking-wider">
      Transcription Output
    </h3>
    <p class="text-gray-400 italic">
      Analyzing dance movements...
    </p>
  </div>

  <!-- Controls -->
  <div class="mt-8">
    <button id="startBtn"
      onclick="startStream()"
      class="px-8 py-3 rounded-xl bg-yellow-500 text-black hover:bg-yellow-400 transition shadow-lg">
      ▶ Start Live Capture
    </button>

    <button id="stopBtn"
      onclick="stopStream()"
      class="hidden px-8 py-3 rounded-xl bg-red-600 text-white hover:bg-red-500 transition shadow-lg">
      ⏹ Stop Capture
    </button>
  </div>

</div>

<script>
let stream = null;

async function startStream() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
    const video = document.getElementById("video");
    video.srcObject = stream;

    video.classList.remove("hidden");
    document.getElementById("placeholder").classList.add("hidden");
    document.getElementById("liveIndicator").classList.remove("hidden");
    document.getElementById("transcriptionBox").classList.remove("hidden");

    document.getElementById("startBtn").classList.add("hidden");
    document.getElementById("stopBtn").classList.remove("hidden");
  } catch (err) {
    alert("Camera access denied or not supported.");
  }
}

function stopStream() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }

  document.getElementById("video").classList.add("hidden");
  document.getElementById("placeholder").classList.remove("hidden");
  document.getElementById("liveIndicator").classList.add("hidden");
  document.getElementById("transcriptionBox").classList.add("hidden");

  document.getElementById("startBtn").classList.remove("hidden");
  document.getElementById("stopBtn").classList.add("hidden");
}
</script>

</body>
</html>
