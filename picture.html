<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Upload Picture</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Playfair Display', serif; }
</style>
</head>

<body class="min-h-screen bg-gradient-to-b from-[#2b0006] via-[#4a000d] to-black text-yellow-400 flex flex-col">

<!-- Header -->
<header class="flex items-center justify-between px-8 py-6">
  <a href="transcribe.html" class="text-gray-400 hover:text-yellow-400 transition">
    ← Back
  </a>
  <h2 class="text-2xl tracking-wider">Upload Picture</h2>
  <div></div>
</header>

<!-- Main -->
<div class="flex-1 flex flex-col items-center px-6 pb-10">

  <input type="file" id="imageInput" accept="image/*" class="hidden">

  <!-- Preview Box -->
  <div id="previewBox"
       onclick="document.getElementById('imageInput').click()"
       class="relative w-full max-w-3xl aspect-video rounded-2xl border-2 border-dashed border-yellow-500/30 
       bg-black/40 backdrop-blur-md flex flex-col items-center justify-center 
       hover:border-yellow-400 hover:bg-black/60 transition duration-300 cursor-pointer shadow-xl">

      <div id="placeholder" class="text-center">
        <div class="text-5xl mb-4">🖼</div>
        <p class="text-lg">Upload Image</p>
        <p class="text-gray-400 text-sm mt-2">
          Supports JPG, PNG and other image formats
        </p>
      </div>

      <img id="imagePreview" class="hidden w-full h-full object-contain" />

      <button id="removeBtn"
              onclick="clearImage(event)"
              class="hidden absolute top-4 right-4 bg-black/70 px-3 py-1 rounded-full text-sm hover:bg-black">
        ✕
      </button>

  </div>

  <!-- File Info -->
  <div id="fileInfo" class="mt-4 text-gray-400 text-sm hidden"></div>

  <!-- Buttons -->
  <div id="actionButtons" class="mt-8 flex gap-4 hidden">
    <button onclick="clearImage()"
      class="px-6 py-3 rounded-xl bg-gray-700 text-white hover:bg-gray-600 transition">
      Choose Another
    </button>

    <button
      class="px-6 py-3 rounded-xl bg-yellow-500 text-black hover:bg-yellow-400 transition shadow-lg">
      Analyze
    </button>
  </div>

</div>

<script>
const imageInput = document.getElementById("imageInput");
const imagePreview = document.getElementById("imagePreview");
const placeholder = document.getElementById("placeholder");
const fileInfo = document.getElementById("fileInfo");
const actionButtons = document.getElementById("actionButtons");
const removeBtn = document.getElementById("removeBtn");

imageInput.addEventListener("change", function() {
  const file = this.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);

  placeholder.classList.add("hidden");
  imagePreview.src = url;
  imagePreview.classList.remove("hidden");

  fileInfo.innerText = file.name + " • " + formatSize(file.size);
  fileInfo.classList.remove("hidden");

  actionButtons.classList.remove("hidden");
  removeBtn.classList.remove("hidden");
});

function clearImage(e) {
  if (e) e.stopPropagation();
  imageInput.value = "";
  imagePreview.classList.add("hidden");
  placeholder.classList.remove("hidden");
  fileInfo.classList.add("hidden");
  actionButtons.classList.add("hidden");
  removeBtn.classList.add("hidden");
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
  return (bytes / (1024 * 1024)).toFixed(1) + " MB";
}
</script>

</body>
</html>
