<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Capture Picture</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Playfair Display', serif; }
</style>
</head>

<body class="min-h-screen bg-gradient-to-b from-[#2b0006] via-[#4a000d] to-black text-yellow-400 flex flex-col">

<!-- Header -->
<header class="flex items-center justify-between px-8 py-6">
  <a href="transcribe.html" onclick="stopCamera()" class="text-gray-400 hover:text-yellow-400 transition">
    ← Back
  </a>
  <h2 class="text-2xl tracking-wider">Capture Picture</h2>
  <div></div>
</header>

<!-- Main -->
<div class="flex-1 flex flex-col items-center px-6 pb-10">

  <!-- Camera Box -->
  <div class="relative w-full max-w-3xl aspect-video rounded-2xl overflow-hidden border border-yellow-500/30 bg-black/40 backdrop-blur-md shadow-xl">

    <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
    <canvas id="canvas" class="hidden"></canvas>
    <img id="photo" class="hidden w-full h-full object-contain" />

  </div>

  <!-- Buttons -->
  <div class="mt-8 flex gap-4">

    <button id="captureBtn"
      onclick="capturePhoto()"
      class="px-8 py-3 rounded-xl bg-yellow-500 text-black hover:bg-yellow-400 transition shadow-lg">
      📸 Capture
    </button>

    <button id="retakeBtn"
      onclick="retakePhoto()"
      class="hidden px-8 py-3 rounded-xl bg-gray-700 text-white hover:bg-gray-600 transition">
      Retake
    </button>

    <button id="analyzeBtn"
      class="hidden px-8 py-3 rounded-xl bg-green-600 text-white hover:bg-green-500 transition shadow-lg">
      Analyze
    </button>

  </div>

</div>

<script>
let stream = null;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const photo = document.getElementById("photo");

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
  } catch (err) {
    alert("Camera access denied.");
  }
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }
}

function capturePhoto() {
  const context = canvas.getContext("2d");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  context.drawImage(video, 0, 0);

  const imageData = canvas.toDataURL("image/png");
  photo.src = imageData;

  video.classList.add("hidden");
  photo.classList.remove("hidden");

  document.getElementById("captureBtn").classList.add("hidden");
  document.getElementById("retakeBtn").classList.remove("hidden");
  document.getElementById("analyzeBtn").classList.remove("hidden");

  stopCamera();
}

function retakePhoto() {
  photo.classList.add("hidden");
  video.classList.remove("hidden");

  document.getElementById("captureBtn").classList.remove("hidden");
  document.getElementById("retakeBtn").classList.add("hidden");
  document.getElementById("analyzeBtn").classList.add("hidden");

  startCamera();
}

startCamera();
</script>

</body>
</html>
