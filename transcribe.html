<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Transcribe</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Playfair Display', serif; }
  .logo {
    font-size: 2.5rem;
    font-weight: 700;
    background: linear-gradient(90deg, #FFD700, #FFA500);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    transition: transform 0.3s ease;
  }
  .logo:hover {
    transform: scale(1.1) rotate(-3deg);
  }
</style>
</head>

<body class="min-h-screen bg-gradient-to-b from-[#2b0006] via-[#4a000d] to-black text-yellow-400 flex flex-col">

<header class="flex flex-col items-center justify-center py-8">
  <!-- Logo -->
  <div class="logo mb-4 cursor-pointer select-none">
    Bharatanatyam AI
  </div>
  
  <!-- Heading -->
  <h2 class="text-3xl md:text-4xl tracking-wider">
    Choose Input Method
  </h2>
</header>

<div class="flex-1 flex items-center justify-center px-6">

  <div class="grid md:grid-cols-3 gap-8 max-w-5xl w-full">

    <!-- Real Time -->
    <a href="live.html"
       class="bg-black/40 backdrop-blur-md border border-yellow-500/30 rounded-2xl p-10 text-center hover:border-yellow-400 hover:bg-black/60 transition duration-300 shadow-xl hover:scale-105">
      <div class="text-5xl mb-6">🎥</div>
      <h3 class="text-xl mb-3">Real-Time Video</h3>
      <p class="text-gray-400 text-sm">
        Start live capture to analyze Bharatanatyam movements instantly.
      </p>
    </a>

    <!-- Picture (Updated) -->
    <a href="picture.html"
       class="bg-black/40 backdrop-blur-md border border-yellow-500/30 rounded-2xl p-10 text-center hover:border-yellow-400 hover:bg-black/60 transition duration-300 shadow-xl hover:scale-105">
      <div class="text-5xl mb-6">🖼</div>
      <h3 class="text-xl mb-3">Picture</h3>
      <p class="text-gray-400 text-sm">
        Upload an image from your device to detect mudras and posture alignment.
      </p>
    </a>

    <!-- Import from Gallery -->
    <a href="gallery.html"
       class="bg-black/40 backdrop-blur-md border border-yellow-500/30 rounded-2xl p-10 text-center hover:border-yellow-400 hover:bg-black/60 transition duration-300 shadow-xl hover:scale-105">
      <div class="text-5xl mb-6">📂</div>
      <h3 class="text-xl mb-3">Import from Gallery</h3>
      <p class="text-gray-400 text-sm">
        Browse images or videos directly from your device.
      </p>
    </a>

  </div>

</div>

</body>
</html>
