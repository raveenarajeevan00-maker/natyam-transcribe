<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Natyam Transcribe - Live</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Playfair Display', serif;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center 
bg-gradient-to-b from-[#3b0008] via-[#5c000f] to-black text-yellow-400 px-6">

  <!-- Title -->
  <h1 class="text-5xl md:text-7xl font-bold text-center mb-10">
    Upload Performance
  </h1>

  <!-- Upload Input -->
  <input type="file" accept="video/*" id="videoUpload"
    class="mb-6 text-white text-lg">

  <!-- Main Button -->
  <button onclick="handleUpload()" 
    class="px-14 py-4 bg-yellow-500 text-black rounded-xl text-lg 
    hover:scale-105 hover:bg-yellow-400 transition duration-300 shadow-xl mb-10">
    Upload & Transcribe
  </button>

  <!-- Video Preview -->
  <video id="videoPreview" controls 
    class="hidden w-full max-w-2xl rounded-xl shadow-2xl border-4 border-yellow-500 mb-6">
  </video>

  <!-- Output Text -->
  <p id="output" class="text-xl text-gray-300 text-center max-w-2xl">
  </p>

<script>
  function handleUpload() {
    const fileInput = document.getElementById("videoUpload");
    const file = fileInput.files[0];

    if (!file) {
      alert("Please select a video first.");
      return;
    }

    const videoURL = URL.createObjectURL(file);
    const video = document.getElementById("videoPreview");
    video.src = videoURL;
    video.classList.remove("hidden");

    document.getElementById("output").innerText =
      "Analyzing performance... Mudra detected: Alapadma | Adavu: Tatta Adavu";
  }
</script>

</body>
</html>
