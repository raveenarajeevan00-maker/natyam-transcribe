<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Natyam Transcribe - Live</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Playfair Display', serif;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center 
bg-gradient-to-b from-[#3b0008] via-[#5c000f] to-black text-yellow-400 px-6">

  <!-- Title -->
  <h1 class="text-5xl md:text-7xl font-bold text-center mb-8">
    Live Transcription
  </h1>

  <!-- Camera -->
  <video id="video" autoplay playsinline 
    class="w-full max-w-2xl rounded-xl shadow-2xl mb-6 border-4 border-yellow-500">
  </video>

  <!-- Buttons -->
  <div class="flex flex-col md:flex-row gap-6 mb-8">

    <button onclick="startCamera()" 
      class="px-10 py-4 bg-yellow-500 text-black rounded-xl text-lg 
      hover:scale-110 hover:bg-yellow-400 transition duration-300 shadow-xl">
      START CAMERA
    </button>

    <label class="px-10 py-4 bg-yellow-500 text-black rounded-xl text-lg 
      hover:scale-110 hover:bg-yellow-400 transition duration-300 shadow-xl cursor-pointer text-center">
      UPLOAD VIDEO
      <input type="file" accept="video/*" id="videoUpload" hidden>
    </label>

  </div>

  <!-- Uploaded Video -->
  <video id="uploadedVideo" controls 
    class="w-full max-w-2xl rounded-xl shadow-2xl mb-6 border-4 border-yellow-500">
  </video>

  <!-- Output -->
  <div class="text-xl text-gray-300 text-center max-w-2xl">
    <p id="output">Waiting for input...</p>
  </div>

<script>
  function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        document.getElementById('video').srcObject = stream;
        document.getElementById('output').innerText =
          "Detecting Mudra... Adavu identified: Tatta Adavu";
      })
      .catch(error => {
        alert("Camera access denied!");
      });
  }

  document.getElementById('videoUpload').addEventListener('change', function(event) {
    const file = event.target.files[0];
    if (!file) return;
    const videoURL = URL.createObjectURL(file);
    document.getElementById('uploadedVideo').src = videoURL;
    document.getElementById('output').innerText =
      "Analyzing uploaded performance... Mudra detected: Alapadma";
  });
</script>

</body>
</html>
