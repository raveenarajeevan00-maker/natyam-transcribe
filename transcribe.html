<!DOCTYPE html>
<html>
<head>
  <title>Transcribe</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center bg-black text-white">

  <h1 class="text-4xl font-bold mb-6">Upload Performance</h1>

  <input type="file" id="videoInput" class="mb-4">

  <button onclick="uploadVideo()"
    class="px-6 py-3 bg-yellow-500 text-black rounded">
    Upload & Transcribe
  </button>

  <p id="result" class="mt-6"></p>

<script>
async function uploadVideo() {
  const fileInput = document.getElementById("videoInput");
  const result = document.getElementById("result");

  if (!fileInput.files.length) {
    alert("Upload a video first!");
    return;
  }

  const formData = new FormData();
  formData.append("video", fileInput.files[0]);

  const response = await fetch("http://127.0.0.1:5000/process", {
    method: "POST",
    body: formData
  });

  const data = await response.json();
  result.innerText = data.transcription;
}
</script>

</body>
</html>
